<!doctype html>
<html lang="ja">
  <head>
    <title>ฝึกอ่าน | タイ語学習</title>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇹🇭</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="タイ語学習 – 読解,会話,語彙を学ぶ" />
    <meta name="author" content="谷口直樹 naoki.tany@gmail.com" />
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@300;400;600&display=swap" rel="stylesheet" />
    <link href="/pagefind/pagefind-ui.css" rel="stylesheet" />
    <script src="/pagefind/pagefind-ui.js"></script>
    <style>
      :root {
        --primary: #2d6a4f;
        --primary-light: #52b788;
        --primary-pale: #d8f3dc;
        --bg: #f8fffe;
        --bg2: #edf7f0;
        --text: #1b2e22;
        --text-light: #4a6855;
        --border: #b7e4c7;
        --white: #ffffff;
        --shadow: 0 2px 12px rgba(45, 106, 79, 0.1);
        --shadow-lg: 0 6px 28px rgba(45, 106, 79, 0.15);
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Noto Sans JP", "Sarabun", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }
      header {
        background: linear-gradient(135deg, #1b4332 0%, #2d6a4f 60%, #40916c 100%);
        color: #fff;
        padding: 36px 24px 28px;
        text-align: center;
        position: relative;
        overflow: hidden;
      }
      header::before {
        content: "📖";
        position: absolute;
        font-size: 140px;
        opacity: 0.07;
        top: -20px;
        left: -20px;
      }
      header::after {
        content: "🇹🇭";
        position: absolute;
        font-size: 120px;
        opacity: 0.07;
        bottom: -20px;
        right: -10px;
      }
      header h1 {
        font-family: "Sarabun", sans-serif;
        font-size: clamp(1.6rem, 5vw, 2.4rem);
        font-weight: 700;
        line-height: 1.3;
        margin-bottom: 8px;
        letter-spacing: 0.05em;
      }
      header p {
        font-family: "Noto Sans JP", sans-serif;
        font-size: 0.9rem;
        opacity: 0.8;
        margin-top: 6px;
      }
      .tab-nav {
        display: flex;
        align-items: center;
        justify-content: center;
        overflow-x: auto;
        background: var(--white);
        border-bottom: 2px solid var(--border);
        position: sticky;
        top: 0;
        z-index: 100;
        box-shadow: 0 2px 8px rgba(45, 106, 79, 0.08);
        -webkit-overflow-scrolling: touch;
      }
      .tab-btn {
        flex: none;
        padding: 14px 18px;
        font-family: "Noto Sans JP", sans-serif;
        font-size: 14px;
        font-weight: 600;
        border: none;
        background: transparent;
        color: var(--text-light);
        cursor: pointer;
        white-space: nowrap;
        border-bottom: 3px solid transparent;
        transition: all 0.2s;
        letter-spacing: 0.02em;
      }
      .tab-btn:hover {
        background: var(--bg2);
        color: var(--primary);
      }
      .tab-btn.active {
        color: var(--primary);
        border-bottom-color: var(--primary);
        background: var(--primary-pale);
      }
      .tab-content {
        display: none;
      }
      .tab-content.active {
        display: block;
      }
      .content-wrap {
        max-width: 860px;
        margin: 0 auto;
        padding: 32px 20px 60px;
      }
      .section-label {
        font-size: 0.78rem;
        font-weight: 600;
        color: var(--text-light);
        letter-spacing: 0.08em;
        margin-bottom: 16px;
        padding-left: 4px;
      }
      .tab-content > .content-wrap > ol {
        list-style: none;
        padding: 0;
        counter-reset: article-counter;
      }
      .tab-content > .content-wrap > ol li {
        counter-increment: article-counter;
        margin-bottom: 12px;
      }
      .tab-content > .content-wrap > ol li a {
        display: flex;
        align-items: center;
        gap: 16px;
        background: var(--white);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 16px 20px;
        text-decoration: none;
        color: var(--text);
        font-size: 0.95rem;
        font-weight: 600;
        transition: all 0.2s;
        box-shadow: var(--shadow);
      }
      .tab-content > .content-wrap > ol li a::before {
        content: counter(article-counter);
        display: flex;
        align-items: center;
        justify-content: center;
        min-width: 32px;
        padding: 2px 6px;
        height: 22px;
        background: var(--bg2);
        color: var(--text-light);
        border: 1px solid var(--border);
        border-radius: 4px;
        font-size: 0.75rem;
        font-weight: 600;
        flex-shrink: 0;
        font-family: "Noto Sans JP", monospace;
      }
      .tab-content > .content-wrap > ol li a:hover {
        background: var(--bg2);
        border-color: var(--primary-light);
        box-shadow: var(--shadow-lg);
        transform: translateY(-1px);
        color: var(--primary);
      }
      ol li a .arrow {
        margin-left: auto;
        color: var(--primary-light);
        font-size: 1.1rem;
        flex-shrink: 0;
      }
      .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: var(--text-light);
      }
      .empty-state .icon {
        font-size: 3rem;
        margin-bottom: 16px;
        opacity: 0.5;
      }
      .empty-state p {
        font-size: 0.92rem;
        opacity: 0.7;
      }
      .search-hint {
        background: linear-gradient(135deg, #d8f3dc, #b7e4c7);
        border-left: 4px solid var(--primary);
        border-radius: 8px;
        padding: 12px 16px;
        margin-bottom: 20px;
        font-size: 0.88rem;
        color: var(--text-light);
      }
      .pagefind-ui {
        --pagefind-ui-primary: #2d6a4f;
        --pagefind-ui-text: #1b2e22;
        --pagefind-ui-background: #f8fffe;
        --pagefind-ui-border: #b7e4c7;
        --pagefind-ui-tag: #d8f3dc;
        font-family: "Noto Sans JP", "Sarabun", sans-serif;
      }
      .pagefind-ui__result-thumb {
        display: none;
      }
      .pagefind-ui__result {
        border-bottom: 1px solid var(--border);
        padding: 16px 0;
      }
      .pagefind-ui__result-title {
        font-size: 1rem;
        font-weight: 600;
      }
      .pagefind-ui__result-excerpt {
        font-size: 0.88rem;
        color: var(--text-light);
        line-height: 1.6;
      }
      [class*="pagefind-ui__result-thumb"] {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>ฝึกอ่าน</h1>
      <p>タイ語長文読解トレーニング</p>
    </header>

    <nav class="tab-nav">
      <button class="tab-btn active" onclick="showTab('news', this)">📰 時事</button>
      <button class="tab-btn" onclick="showTab('health', this)">🌿 健康</button>
      <button class="tab-btn" onclick="showTab('culture', this)">🎓 教養</button>
      <button class="tab-btn" onclick="showTab('search', this)">🔍 検索</button>
    </nav>

    <!-- 時事 -->
    <div id="tab-news" class="tab-content active">
      <div class="content-wrap">
        <ol>
          <li>
            <a href="/news/10002">
              イランvsアメリカ、どれほど深刻で私たちと何の関係があるのか
              <span class="arrow">›</span>
            </a>
          </li>
          <li>
            <a href="/news/10001">
              なぜ中東地域に平和は訪れないのか？
              <span class="arrow">›</span>
            </a>
          </li>
        </ol>
      </div>
    </div>

    <!-- 健康 -->
    <div id="tab-health" class="tab-content">
      <div class="content-wrap">
        <ol>
          <li>
            <a href="/health/20004">
              ストレスを簡単に管理する方法
              <span class="arrow">›</span>
            </a>
          </li>
          <li>
            <a href="/health/20003">
              12-3-30ウォーキング公式：2026年のフィットネストレンド、簡単で効果抜群
              <span class="arrow">›</span>
            </a>
          </li>
          <li>
            <a href="/health/20002">
              肺がん危機・1日40人死亡、PM2.5が元凶！
              <span class="arrow">›</span>
            </a>
          </li>
          <li>
            <a href="/health/20001">
              6時間未満VS8時間超の睡眠、どちらも健康に悪影響
              <span class="arrow">›</span>
            </a>
          </li>
        </ol>
      </div>
    </div>

    <!-- 教養 -->
    <div id="tab-culture" class="tab-content">
      <div class="content-wrap">
        <ol>
          <li>
            <a href="/culture/30001">
              マーカブーチャ（万仏節）2569 — 由来・意義・教え
              <span class="arrow">›</span>
            </a>
          </li>
        </ol>
      </div>
    </div>

    <!-- 検索 -->
    <div id="tab-search" class="tab-content">
      <div class="content-wrap">
        <div class="search-hint">💡 日本語でもタイ語でも検索できます。記事中で一番最初にヒットした箇所を表示します。</div>
        <div id="search"></div>
      </div>
    </div>

    <script>
      function showTab(name, btn) {
        document.querySelectorAll(".tab-content").forEach((el) => el.classList.remove("active"));
        document.querySelectorAll(".tab-btn").forEach((el) => el.classList.remove("active"));
        document.getElementById("tab-" + name).classList.add("active");
        btn.classList.add("active");
        history.replaceState(null, "", "#" + name);
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      // 記事リンクのクリック時にスクロール位置をsessionStorageに保存
      document.addEventListener("DOMContentLoaded", function () {
        document.querySelectorAll(".tab-content a[href]").forEach(function (link) {
          link.addEventListener("click", function (e) {
            const scrollY = document.documentElement.scrollTop;
            if (scrollY > 0) {
              sessionStorage.setItem("indexScrollY", scrollY);
            }
          });
        });
      });

      // ページ読み込み時にハッシュからタブを復元（スクロール位置は維持）
      (function () {
        const hash = location.hash.replace("#", "");
        const validTabs = ["news", "health", "culture", "search"];
        if (validTabs.includes(hash)) {
          const btn = document.querySelector(`.tab-btn[onclick*="'${hash}'"]`);
          if (btn) {
            document.querySelectorAll(".tab-content").forEach((el) => el.classList.remove("active"));
            document.querySelectorAll(".tab-btn").forEach((el) => el.classList.remove("active"));
            document.getElementById("tab-" + hash).classList.add("active");
            btn.classList.add("active");
            const scrollY = sessionStorage.getItem("indexScrollY");
            history.replaceState(null, "", "#" + hash);
            if (scrollY !== null) {
              sessionStorage.removeItem("indexScrollY");
              if ("scrollRestoration" in history) history.scrollRestoration = "manual";
              setTimeout(function () {
                document.documentElement.scrollTop = parseInt(scrollY);
              }, 300);
            }
          }
        }
      })();

      window.addEventListener("DOMContentLoaded", () => {
        new PagefindUI({ element: "#search", showSubResults: true, pageSize: 10 });
      });
    </script>
  </body>
</html>
